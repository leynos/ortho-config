name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    env:
      CARGO_TERM_COLOR: always
      CS_ACCESS_TOKEN: ${{ secrets.CS_ACCESS_TOKEN }}
      RUSTFLAGS: -D warnings
      RUSTDOCFLAGS: -D warnings
      WHITAKER_INSTALLER_VERSION: '0.2.6'
      # generate-coverage kills cargo after RUN_RUST_CARGO_WAIT_TIMEOUT
      # seconds (default 600). The windows coverage run legitimately takes
      # ~12 min (the compile_fail trybuild test alone is ~200s), and the
      # 927edd4 action now emits full per-line data, so raise the ceiling.
      RUN_RUST_CARGO_WAIT_TIMEOUT: '1800'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: windows-latest
    steps:
      - name: Checkout
        # fetch-depth: 0 makes the pull request's merge base reachable so the
        # CodeScene changed-line coverage gate (cs-coverage check) can diff
        # against it.
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: leynos/shared-actions/.github/actions/setup-rust@074f7d8ba75a6e5d18532b72cbe38fccbda4e9c6

      - name: Install bun
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76  # v2
        with:
          bun-version: '1.2.21'

      - name: Check formatting
        run: make check-fmt

      - name: Install Mermaid CLI
        shell: bash
        run: |
          set -euxo pipefail
          bun install --no-progress --global @mermaid-js/mermaid-cli@11.9.0
          bun x @puppeteer/browsers browsers install chrome-headless-shell
          mmdc --version

      - name: Setup uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          version: 'latest'

      - name: Install Nixie
        run: uv tool install nixie-cli@1.1.0

      - name: Setup Rust for Merman
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9  # master
        with:
          toolchain: '1.95.0'

      - name: Install Merman CLI
        run: cargo +1.95.0 install merman-cli --version '=0.7.0' --locked

      - name: Nixie
        run: make nixie

      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@30a0e04f1870d58f8d717450cc6134995f993c63  # v20
        with:
          globs: '**/*.md'

      - name: Spelling (en-GB-oxendict)
        run: make spellcheck

      - name: Cache Whitaker installer
        if: ${{ matrix.os == 'ubuntu-latest' }}
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: |
            ~/.cargo/bin/whitaker-installer
            ~/.cache/cargo-binstall
          key: whitaker-installer-${{ runner.os }}-${{ runner.arch }}-${{ env.WHITAKER_INSTALLER_VERSION }}

      - name: Install Whitaker
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          # `cargo binstall --version` exits non-zero (the flag requires a
          # value), so probe availability with `-V` instead.
          if ! command -v whitaker-installer >/dev/null 2>&1; then
            if cargo binstall -V >/dev/null 2>&1; then
              cargo binstall --no-confirm --locked "whitaker-installer@${WHITAKER_INSTALLER_VERSION}"
            else
              echo "cargo-binstall unavailable; building whitaker-installer from crates.io"
              cargo install --locked whitaker-installer --version "${WHITAKER_INSTALLER_VERSION}"
            fi
          fi
          # whitaker-installer 0.2.6 probes binstall with the same broken
          # `--version` flag, so its dylint-link fallback compiles from
          # crates.io and needs rustc >= 1.91 — newer than this repository's
          # pinned nightly. Preinstall the prebuilt dylint-link that the
          # installer expects so it detects the tool and skips that path.
          if cargo binstall -V >/dev/null 2>&1; then
            cargo binstall --no-confirm dylint-link@6.0.1
          fi
          whitaker-installer

      - name: Lint
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: make lint

      # Whitaker lints under its own pinned toolchain on the Linux leg;
      # the Windows leg runs rustdoc and Clippy only.
      - name: Lint (Clippy only)
        if: ${{ matrix.os != 'ubuntu-latest' }}
        run: make lint-clippy

      - name: Workflow contract tests
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: make test-workflow-contracts

      - name: Test and Measure Coverage (with serde_saphyr)
        # Broadest feature set, so this leg carries the coverage ratchet
        # (one baseline per job). Ratchet only on the ubuntu leg, which
        # compares against the baseline written by coverage-main.yml.
        uses: leynos/shared-actions/.github/actions/generate-coverage@18bed1ca49a6de3d8882bd72635a32ae3f023d57
        with:
          output-path: lcov-serde-saphyr.info
          format: lcov
          features: serde_json toml json5 yaml
          artefact-name-suffix: serde-saphyr
          with-ratchet: ${{ matrix.os == 'ubuntu-latest' }}

      - name: Test and Measure Coverage (without serde_saphyr)
        uses: leynos/shared-actions/.github/actions/generate-coverage@18bed1ca49a6de3d8882bd72635a32ae3f023d57
        with:
          output-path: lcov-no-serde-saphyr.info
          format: lcov
          features: serde_json toml json5
          artefact-name-suffix: no-serde-saphyr

      - name: Merge coverage results
        if: ${{ matrix.os == 'ubuntu-latest' }}
        shell: bash
        # lcov-result-merger takes a single glob pattern and an optional
        # output file; passing two file paths treats the second as the
        # output and leaves stdout empty. Match both feature-leg reports
        # with one glob ('lcov-*.info' excludes the lcov.info output) and
        # write the merged result via stdout.
        run: bun x lcov-result-merger 'lcov-*.info' > lcov.info

      - name: Check coverage against CodeScene gates
        env:
          CS_ACCESS_TOKEN: ${{ secrets.CS_ACCESS_TOKEN }}
        if: >-
          env.CS_ACCESS_TOKEN != '' && github.event_name == 'pull_request' &&
          matrix.os == 'ubuntu-latest'
        uses: leynos/shared-actions/.github/actions/upload-codescene-coverage@18bed1ca49a6de3d8882bd72635a32ae3f023d57
        with:
          format: lcov
          mode: check
          project-url: https://api.codescene.io/v2/projects/69279
          access-token: ${{ env.CS_ACCESS_TOKEN }}
          installer-checksum: ${{ vars.CODESCENE_CLI_SHA256 }}

      - name: Validate PowerShell wrapper
        if: ${{ matrix.os == 'windows-latest' }}
        run: make powershell-wrapper-validate

      - name: Publish dry run
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: make publish-check
